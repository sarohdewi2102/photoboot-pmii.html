<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PMII Photobooth Frame</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f0f0;
      text-align: center;
      padding: 30px;
    }

    .photobooth {
      width: 360px;
      height: 1100px;
      border: 20px solid #0047ab; /* biru PMII */
      border-radius: 25px;
      background: linear-gradient(270deg, #0047ab, #ffd700);
      background-size: 400% 400%;
      animation: gradientMove 8s ease infinite;
      box-shadow: 0 0 30px rgba(0,0,0,0.4);
      margin: auto;
      position: relative;
      overflow: hidden;
      transition: box-shadow 0.5s;
    }

    @keyframes gradientMove {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }

    .photo {
      width: 300px;
      height: 300px;
      margin: 20px auto;
      border: 5px solid white;
      border-radius: 15px;
      background-color: #ddd;
      background-size: cover;
      background-position: center;
      box-shadow: 0 0 15px rgba(0,0,0,0.3);
      transition: transform 0.5s;
    }

    .photo:hover {
      transform: scale(1.05);
    }

    .logo {
      position: absolute;
      top: 15px;
      left: 15px;
      width: 70px;
      height: 70px;
      background: url('pmii-flag.png') no-repeat center;
      background-size: contain;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% {transform: scale(1);}
      50% {transform: scale(1.1);}
      100% {transform: scale(1);}
    }

    .maturelight {
      position: absolute;
      top: 20px;
      right: 20px;
      font-size: 22px;
      font-weight: bold;
      color: white;
      text-shadow: 2px 2px 6px #000;
      animation: glow 2s ease-in-out infinite alternate;
    }

    @keyframes glow {
      from {color: #fff; text-shadow: 0 0 5px #0047ab;}
      to {color: #ffd700; text-shadow: 0 0 15px #ffd700;}
    }

    .caption {
      position: absolute;
      bottom: 20px;
      width: 100%;
      text-align: center;
      color: #fff;
      font-weight: bold;
      font-size: 20px;
      text-shadow: 2px 2px 4px #000;
    }

    .controls {
      margin-top: 15px;
    }

    .controls button {
      padding: 10px 20px;
      margin: 5px;
      border: none;
      border-radius: 8px;
      background: #0047ab;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s;
    }

    .controls button:hover {
      background: #ffd700;
      color: #000;
    }
  </style>
</head>
<body>
  <h1>PMII Photobooth Frame</h1>
  <div class="photobooth" id="frame">
    <div class="logo"></div>
    <div class="maturelight">MATURELIGHT</div>

    <!-- Tiga foto vertikal -->
    <div class="photo" id="photo1"></div>
    <div class="photo" id="photo2"></div>
    <div class="photo" id="photo3"></div>

    <div class="caption">PMII SPIRIT ✨</div>
  </div>

  <div class="controls">
    <button onclick="prevPhoto()">Previous</button>
    <button onclick="nextPhoto()">Next</button>
  </div>

  <script>
    const frame = document.getElementById('frame');
    frame.addEventListener('click', function() {
      this.style.boxShadow = "0 0 40px #0047ab, 0 0 60px #ffd700";
      alert("PMII Spirit - Maturelight!");
      setTimeout(() => {
        this.style.boxShadow = "0 0 30px rgba(0,0,0,0.4)";
      }, 1000);
    });

    // daftar foto
    const photos = [
      ['photo1.jpeg','photo2.jpeg','photo3.jpeg'],
      ['photo1.jpeg','photo2.jpeg','photo3.jpeg'],
      ['photo1.jpeg','photo2.jpeg','photo3.jpeg']
    ];
    let currentSet = 0;

    function showPhotos() {
      document.getElementById('photo1').style.backgroundImage = `url('${photos[currentSet][0]}')`;
      document.getElementById('photo2').style.backgroundImage = `url('${photos[currentSet][1]}')`;
      document.getElementById('photo3').style.backgroundImage = `url('${photos[currentSet][2]}')`;
    }

    function nextPhoto() {
      currentSet = (currentSet + 1) % photos.length;
      showPhotos();
    }

    function prevPhoto() {
      currentSet = (currentSet - 1 + photos.length) % photos.length;
      showPhotos();
    }

    // tampilkan set pertama
    showPhotos();
  </script>
</body>
</html>
